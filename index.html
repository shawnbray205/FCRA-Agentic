<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FCRA Case Manager</title>
<style>
/* ========== RESET & BASE ========== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg-primary: #0f1419;
  --bg-secondary: #1a2332;
  --bg-tertiary: #243044;
  --bg-sidebar: #141d2b;
  --bg-input: #1e293b;
  --accent-gold: #d4a843;
  --accent-amber: #f5a623;
  --accent-copper: #b87333;
  --status-pending: #6b7280;
  --status-active: #3b82f6;
  --status-complete: #22c55e;
  --status-error: #ef4444;
  --text-primary: #e8edf3;
  --text-secondary: #94a3b8;
  --text-muted: #64748b;
  --border-color: #2d3a4e;
  --sidebar-width: 280px;
  --radius: 8px;
  --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  --font-mono: 'SF Mono', 'Cascadia Code', 'Fira Code', monospace;
}

html, body { height: 100%; }

body {
  font-family: var(--font-sans);
  background: var(--bg-primary);
  color: var(--text-primary);
  line-height: 1.5;
  overflow: hidden;
}

/* ========== LAYOUT ========== */
#app {
  display: grid;
  grid-template-columns: var(--sidebar-width) 1fr;
  grid-template-rows: auto 1fr auto;
  grid-template-areas:
    "sidebar header"
    "sidebar main"
    "sidebar status";
  height: 100vh;
}

/* ========== HEADER ========== */
#config-bar {
  grid-area: header;
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 10px 24px;
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border-color);
}

#config-bar h1 {
  font-size: 16px;
  font-weight: 700;
  color: var(--accent-gold);
  white-space: nowrap;
  letter-spacing: 0.5px;
}

#config-bar .header-meta {
  font-size: 11px;
  color: var(--text-muted);
  white-space: nowrap;
  margin-left: auto;
}

.connection-dot {
  width: 8px; height: 8px; border-radius: 50%;
  display: inline-block; margin-right: 6px;
}
.connection-dot.connected { background: var(--status-complete); }
.connection-dot.disconnected { background: var(--status-error); }

/* ========== SIDEBAR ========== */
#case-sidebar {
  grid-area: sidebar;
  background: var(--bg-sidebar);
  border-right: 1px solid var(--border-color);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

#case-sidebar .sidebar-header {
  padding: 16px;
  border-bottom: 1px solid var(--border-color);
}

#case-sidebar .sidebar-header h2 {
  font-size: 13px;
  color: var(--text-secondary);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 12px;
}

.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 8px 16px;
  border: none;
  border-radius: var(--radius);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
}

.btn-primary {
  background: var(--accent-gold);
  color: #0f1419;
  width: 100%;
}

.btn-primary:hover { background: var(--accent-amber); }
.btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

.btn-secondary {
  background: var(--bg-tertiary);
  color: var(--text-primary);
  border: 1px solid var(--border-color);
}

.btn-secondary:hover { border-color: var(--accent-gold); }

.btn-approve {
  background: rgba(34,197,94,0.15);
  color: #22c55e;
  border: 1px solid #22c55e;
  padding: 6px 14px;
  font-size: 12px;
}
.btn-approve:hover { background: rgba(34,197,94,0.25); }

.btn-reject {
  background: rgba(239,68,68,0.15);
  color: #ef4444;
  border: 1px solid #ef4444;
  padding: 6px 14px;
  font-size: 12px;
}
.btn-reject:hover { background: rgba(239,68,68,0.25); }

.btn-sm { padding: 4px 10px; font-size: 12px; }

#case-list {
  flex: 1;
  overflow-y: auto;
  padding: 8px;
}

.case-item {
  padding: 12px;
  border-radius: var(--radius);
  cursor: pointer;
  margin-bottom: 4px;
  transition: background 0.15s;
  border: 1px solid transparent;
}

.case-item:hover { background: var(--bg-tertiary); }

.case-item.active {
  background: var(--bg-tertiary);
  border-color: var(--accent-gold);
}

.case-name {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 14px;
  font-weight: 600;
}

.case-meta {
  font-size: 11px;
  color: var(--text-muted);
  margin-top: 4px;
}

.case-stage-badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 10px;
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.stage-intake { background: rgba(59,130,246,0.2); color: #60a5fa; }
.stage-parsing { background: rgba(168,85,247,0.2); color: #c084fc; }
.stage-chronology { background: rgba(245,158,11,0.2); color: #fbbf24; }
.stage-letter { background: rgba(236,72,153,0.2); color: #f472b6; }
.stage-comms { background: rgba(34,211,238,0.2); color: #22d3ee; }
.stage-review { background: rgba(34,197,94,0.2); color: #4ade80; }
.stage-closed { background: rgba(107,114,128,0.2); color: #9ca3af; }

.priority-urgent { color: #ef4444; font-weight: 700; }
.priority-high { color: #f59e0b; font-weight: 600; }
.priority-medium { color: var(--text-secondary); }
.priority-low { color: var(--text-muted); }

/* ========== MAIN ========== */
#workspace {
  grid-area: main;
  overflow-y: auto;
  padding: 24px;
}

.no-case-view {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  color: var(--text-muted);
  gap: 16px;
}

.no-case-view .logo { font-size: 48px; opacity: 0.4; }

/* Intake form */
.intake-form {
  max-width: 700px;
  margin: 0 auto;
}

.intake-form h2 {
  font-size: 20px;
  color: var(--accent-gold);
  margin-bottom: 20px;
}

.form-group {
  margin-bottom: 16px;
}

.form-group label {
  display: block;
  font-size: 12px;
  font-weight: 600;
  color: var(--text-secondary);
  margin-bottom: 6px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.form-group input, .form-group textarea, .form-group select {
  width: 100%;
  padding: 8px 12px;
  background: var(--bg-input);
  border: 1px solid var(--border-color);
  border-radius: var(--radius);
  color: var(--text-primary);
  font-size: 13px;
  font-family: var(--font-sans);
}

.form-group input:focus, .form-group textarea:focus, .form-group select:focus {
  outline: none;
  border-color: var(--accent-gold);
}

.form-group textarea { min-height: 80px; resize: vertical; }

.form-group .help-text {
  font-size: 11px;
  color: var(--text-muted);
  margin-top: 4px;
}

.required { color: var(--status-error); }

.form-actions { margin-top: 24px; }

/* Case detail view */
.case-detail { max-width: 900px; }

.case-detail-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 24px;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--border-color);
}

.case-detail-header h2 {
  font-size: 22px;
  color: var(--text-primary);
}

.case-detail-header .case-id {
  font-size: 11px;
  color: var(--text-muted);
  font-family: var(--font-mono);
  margin-top: 4px;
}

/* Pipeline progress */
.pipeline-bar {
  display: flex;
  gap: 4px;
  margin-bottom: 24px;
  background: var(--bg-secondary);
  border-radius: var(--radius);
  padding: 12px 16px;
  align-items: center;
}

.pipeline-step {
  flex: 1;
  text-align: center;
  padding: 8px 4px;
  border-radius: 6px;
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  position: relative;
}

.pipeline-step.done { background: rgba(34,197,94,0.15); color: #4ade80; }
.pipeline-step.active { background: rgba(59,130,246,0.2); color: #60a5fa; animation: pulse 2s infinite; }
.pipeline-step.pending { background: var(--bg-tertiary); color: var(--text-muted); }

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.6; }
}

.pipeline-arrow {
  color: var(--text-muted);
  font-size: 10px;
  flex-shrink: 0;
}

/* Stage tabs */
.stage-tabs {
  display: flex;
  gap: 2px;
  margin-bottom: 20px;
  border-bottom: 1px solid var(--border-color);
}

.stage-tab {
  padding: 10px 16px;
  font-size: 13px;
  font-weight: 600;
  color: var(--text-muted);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all 0.15s;
}

.stage-tab:hover { color: var(--text-secondary); }
.stage-tab.active { color: var(--accent-gold); border-bottom-color: var(--accent-gold); }
.stage-tab.has-data { color: var(--text-primary); }
.stage-tab.has-data::after { content: ' \2713'; color: var(--status-complete); font-size: 11px; }

/* Stage content */
.stage-content {
  background: var(--bg-secondary);
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 20px;
}

.stage-empty {
  text-align: center;
  padding: 40px;
  color: var(--text-muted);
  font-size: 13px;
}

/* Summary cards */
.summary-cards {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 12px;
  margin-bottom: 20px;
}

.summary-card {
  background: var(--bg-tertiary);
  border-radius: var(--radius);
  padding: 16px;
  text-align: center;
}

.card-value {
  font-size: 24px;
  font-weight: 700;
  color: var(--accent-gold);
}

.card-label {
  font-size: 11px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-top: 4px;
}

/* Result sections */
.result-section {
  margin-bottom: 16px;
  border: 1px solid var(--border-color);
  border-radius: var(--radius);
  overflow: hidden;
}

.result-section-header {
  padding: 12px 16px;
  background: var(--bg-tertiary);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.result-section-header .toggle-icon { transition: transform 0.15s; font-size: 10px; }
.result-section-header.open .toggle-icon { transform: rotate(90deg); }

.result-section-body {
  display: none;
  padding: 16px;
}

.result-section-body.open { display: block; }

.result-list { list-style: none; }
.result-list li {
  padding: 8px 0;
  border-bottom: 1px solid rgba(45,58,78,0.5);
  font-size: 13px;
}
.result-list li:last-child { border-bottom: none; }
.item-label { font-weight: 600; color: var(--text-secondary); display: block; font-size: 11px; text-transform: uppercase; margin-bottom: 2px; }
.item-value { color: var(--text-primary); }

.badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 10px;
  font-size: 11px;
  font-weight: 600;
}
.badge-critical { background: rgba(239,68,68,0.2); color: #f87171; }
.badge-high { background: rgba(245,158,11,0.2); color: #fbbf24; }
.badge-medium { background: rgba(59,130,246,0.2); color: #60a5fa; }
.badge-low { background: rgba(34,197,94,0.2); color: #4ade80; }

/* Attorney actions */
.attorney-actions {
  display: flex;
  gap: 10px;
  padding: 16px;
  background: rgba(212,168,67,0.06);
  border: 1px solid rgba(212,168,67,0.2);
  border-radius: var(--radius);
  margin-bottom: 20px;
  align-items: center;
}

.attorney-actions .label {
  font-size: 12px;
  font-weight: 600;
  color: var(--accent-gold);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-right: auto;
}

/* Activity timeline */
.activity-timeline {
  margin-top: 24px;
}

.activity-timeline h3 {
  font-size: 14px;
  color: var(--text-secondary);
  margin-bottom: 12px;
}

.activity-item {
  display: flex;
  gap: 12px;
  padding: 10px 0;
  border-bottom: 1px solid rgba(45,58,78,0.3);
  font-size: 12px;
}

.activity-item .time {
  color: var(--text-muted);
  white-space: nowrap;
  min-width: 140px;
  font-family: var(--font-mono);
  font-size: 11px;
}

.activity-item .actor {
  color: var(--accent-copper);
  min-width: 80px;
}

.activity-item .summary { color: var(--text-primary); }

/* Document preview */
.document-preview {
  background: var(--bg-primary);
  border: 1px solid var(--border-color);
  border-radius: var(--radius);
  padding: 20px;
  font-size: 13px;
  line-height: 1.7;
  white-space: pre-wrap;
  max-height: 400px;
  overflow-y: auto;
}

/* Draft banner */
.draft-banner {
  text-align: center;
  padding: 8px;
  border: 1px dashed var(--accent-copper);
  color: var(--accent-copper);
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 1px;
  margin-bottom: 16px;
  border-radius: var(--radius);
}

/* Raw JSON */
.raw-json {
  background: var(--bg-primary);
  border-radius: var(--radius);
  padding: 12px;
  font-family: var(--font-mono);
  font-size: 11px;
  white-space: pre-wrap;
  max-height: 300px;
  overflow-y: auto;
  color: var(--text-secondary);
}

/* Email preview */
.email-preview {
  background: var(--bg-primary);
  border: 1px solid var(--border-color);
  border-radius: var(--radius);
  overflow: hidden;
}
.email-header {
  padding: 12px 16px;
  border-bottom: 1px solid var(--border-color);
  font-size: 13px;
}
.email-field { margin-bottom: 4px; }
.email-body { padding: 16px; font-size: 13px; white-space: pre-wrap; line-height: 1.7; }

/* Loading */
.loading-overlay {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 60px;
  gap: 16px;
}

.spinner {
  width: 32px; height: 32px;
  border: 3px solid var(--border-color);
  border-top-color: var(--accent-gold);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

.loading-text { color: var(--text-muted); font-size: 13px; }

/* Status bar */
#status-bar {
  grid-area: status;
  display: flex;
  justify-content: space-between;
  padding: 6px 24px;
  font-size: 11px;
  color: var(--text-muted);
  background: var(--bg-secondary);
  border-top: 1px solid var(--border-color);
}

/* Print styles */
@media print {
  #case-sidebar, #config-bar, #status-bar, .btn, .attorney-actions { display: none !important; }
  #app { display: block !important; }
  #workspace { padding: 0 !important; overflow: visible !important; }
  body { background: #fff; color: #000; }
  .draft-banner { color: #b45309; border-color: #b45309; }
}
</style>
</head>
<body>

<div id="app">
  <!-- SIDEBAR -->
  <aside id="case-sidebar">
    <div class="sidebar-header">
      <h2>Cases</h2>
      <button class="btn btn-primary" onclick="App.showIntakeForm()">+ New Case</button>
    </div>
    <div id="case-list"></div>
  </aside>

  <!-- HEADER -->
  <header id="config-bar">
    <h1>FCRA CASE MANAGER</h1>
    <span id="connection-status"></span>
    <span class="header-meta" id="header-date"></span>
  </header>

  <!-- MAIN -->
  <main id="workspace">
    <div class="no-case-view">
      <div class="logo">&#9878;</div>
      <div>Create or select a case to begin</div>
    </div>
  </main>

  <!-- STATUS BAR -->
  <footer id="status-bar">
    <span id="status-left">Ready</span>
    <span id="status-right">FCRA Case Manager v2.0 — Supabase</span>
  </footer>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
// ============================================================
// FCRA CASE MANAGER v2.0 — Supabase-Backed
// ============================================================

const App = (() => {

// ==================== CONFIG ====================
const SUPABASE_URL = 'https://qygsgyiyxabztaghggvt.supabase.co';
const SUPABASE_ANON_KEY = 'SUPABASE_ANON_KEY'; // Replace with actual anon key
const N8N_BASE_URL = 'https://sbray205.app.n8n.cloud';

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const STAGE_ORDER = ['intake', 'parsing', 'chronology', 'letter', 'comms', 'review', 'closed'];
const STAGE_LABELS = {
  intake: 'Intake', parsing: 'Parser', chronology: 'Chronology',
  letter: 'Letter', comms: 'Comms', review: 'Review', closed: 'Closed'
};

// ==================== STATE ====================
let state = {
  cases: [],
  currentCaseId: null,
  currentTab: 'intake',
  caseData: null,  // full joined data for selected case
  isSubmitting: false,
  realtimeChannel: null
};

// ==================== SUPABASE QUERIES ====================
async function fetchCases() {
  const { data, error } = await supabase
    .from('fcra_cases')
    .select('id, client_name, case_stage, case_status, priority, created_at, updated_at')
    .order('updated_at', { ascending: false });
  if (error) { setStatus('Error loading cases: ' + error.message); return []; }
  return data || [];
}

async function fetchCaseDetail(caseId) {
  const [caseRes, triageRes, parsedRes, chronRes, letterRes, commsRes, activityRes] = await Promise.all([
    supabase.from('fcra_cases').select('*').eq('id', caseId).single(),
    supabase.from('fcra_triage_results').select('*').eq('case_id', caseId).order('created_at', { ascending: false }).limit(1),
    supabase.from('fcra_parsed_reports').select('*').eq('case_id', caseId).order('created_at', { ascending: false }).limit(1),
    supabase.from('fcra_case_chronology').select('*').eq('case_id', caseId).order('created_at', { ascending: false }).limit(1),
    supabase.from('fcra_letters').select('*').eq('case_id', caseId).order('created_at', { ascending: false }).limit(1),
    supabase.from('fcra_communications').select('*').eq('case_id', caseId).order('created_at', { ascending: false }),
    supabase.from('fcra_case_activity').select('*').eq('case_id', caseId).order('created_at', { ascending: false }).limit(50)
  ]);

  return {
    case_record: caseRes.data,
    triage: triageRes.data?.[0] || null,
    parsed: parsedRes.data?.[0] || null,
    chronology: chronRes.data?.[0] || null,
    letter: letterRes.data?.[0] || null,
    communications: commsRes.data || [],
    activity: activityRes.data || []
  };
}

// ==================== REALTIME ====================
function subscribeToChanges() {
  if (state.realtimeChannel) state.realtimeChannel.unsubscribe();

  state.realtimeChannel = supabase
    .channel('fcra-cases-changes')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'fcra_cases' }, async () => {
      state.cases = await fetchCases();
      renderCaseList();
      if (state.currentCaseId) {
        state.caseData = await fetchCaseDetail(state.currentCaseId);
        renderWorkspace();
      }
    })
    .subscribe();
}

// ==================== HELPERS ====================
function formatDate(iso) {
  if (!iso) return '';
  return new Date(iso).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric', hour: '2-digit', minute: '2-digit' });
}

function formatShortDate(iso) {
  if (!iso) return '';
  return new Date(iso).toLocaleDateString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
}

function setStatus(msg) {
  document.getElementById('status-left').textContent = msg;
}

function escHtml(str) {
  const div = document.createElement('div');
  div.textContent = String(str ?? '');
  return div.innerHTML;
}

function escAttr(str) {
  return String(str ?? '').replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function stageIndex(stage) {
  return STAGE_ORDER.indexOf(stage);
}

// ==================== INTAKE FORM ====================
function showIntakeForm() {
  state.currentCaseId = null;
  state.caseData = null;
  renderCaseList();

  const workspace = document.getElementById('workspace');
  workspace.innerHTML = `
    <div class="intake-form">
      <h2>New FCRA Case Intake</h2>
      <p style="color:var(--text-secondary);font-size:13px;margin-bottom:20px;">
        Submit a new case to run the full FCRA analysis pipeline (Intake Triage, Credit Report Parsing, Case Chronology, Dispute Letter, Client Communications).
      </p>
      <div class="form-group">
        <label>Client Name <span class="required">*</span></label>
        <input type="text" id="field-client_name" placeholder="Full legal name">
      </div>
      <div class="form-group">
        <label>Client Email</label>
        <input type="email" id="field-client_email" placeholder="client@example.com">
      </div>
      <div class="form-group">
        <label>Complaint Summary <span class="required">*</span></label>
        <textarea id="field-complaint_summary" rows="4" placeholder="Describe the FCRA violation or complaint..."></textarea>
        <div class="help-text">Include details about credit report errors, disputed items, and impact on the client.</div>
      </div>
      <div class="form-group">
        <label>Error Type <span class="required">*</span></label>
        <select id="field-error_type">
          <option value="">-- Select --</option>
          <option value="inaccurate_information">Inaccurate Information</option>
          <option value="mixed_file">Mixed File</option>
          <option value="identity_theft">Identity Theft</option>
          <option value="reinvestigation_failure">Reinvestigation Failure</option>

async function submitIntake() {
  if (state.isSubmitting) return;

  const clientName = document.getElementById('field-client_name')?.value.trim();
  const complaintSummary = document.getElementById('field-complaint_summary')?.value.trim();
  const errorType = document.getElementById('field-error_type')?.value;

  if (!clientName || !complaintSummary || !errorType) {
    setStatus('Please fill in all required fields');
    ['field-client_name', 'field-complaint_summary', 'field-error_type'].forEach(id => {
      const el = document.getElementById(id);
      if (el && !el.value.trim()) el.style.borderColor = 'var(--status-error)';
    });
    return;
  }

  const payload = {
    client_name: clientName,
    client_email: document.getElementById('field-client_email')?.value.trim() || null,
    complaint_summary: complaintSummary,
    error_type: errorType,
    discovery_date: document.getElementById('field-discovery_date')?.value || null,
    dispute_history: document.getElementById('field-dispute_history')?.value.trim() || '',
    priority: document.getElementById('field-priority')?.value || 'medium'
  };

  state.isSubmitting = true;
  const btn = document.getElementById('btn-submit');
  if (btn) { btn.disabled = true; btn.textContent = 'Submitting...'; }
  setStatus('Submitting to FCRA pipeline...');

  try {
    const controller = new AbortController();
    const timeout = setTimeout(() => controller.abort(), 300000); // 5 min for full pipeline

    const res = await fetch(N8N_BASE_URL + '/webhook/fcra-pipeline', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
      signal: controller.signal
    });

    clearTimeout(timeout);

    if (!res.ok) throw new Error('HTTP ' + res.status + ': ' + (await res.text()).substring(0, 200));

    const result = await res.json();
    setStatus('Pipeline completed: ' + (result.stages_completed?.length || 0) + ' stages');

    // Refresh case list and select the new case
    state.cases = await fetchCases();
    if (result.case_id) {
      await selectCase(result.case_id);
    }

  } catch (err) {
    setStatus('Error: ' + (err.name === 'AbortError' ? 'Request timed out (5min)' : err.message));
    // Still refresh cases — the case may have been created even if pipeline failed partway
    state.cases = await fetchCases();
    renderCaseList();
  }

  state.isSubmitting = false;
}

// ==================== CASE SELECTION ====================
async function selectCase(id) {

  state.currentTab = 'intake';
  setStatus('Loading case...');

  state.caseData = await fetchCaseDetail(id);
  setStatus('Case loaded');
  renderCaseList();

}

function switchTab(tab) {

}

// ==================== ATTORNEY ACTIONS ====================
async function approveStage(table, recordId) {
  const { error } = await supabase
    .from(table)
    .update({ approval_status: 'approved', approved_by: 'Attorney', approved_at: new Date().toISOString() })
    .eq('id', recordId);

  if (error) { setStatus('Error: ' + error.message); return; }

  // Log activity
  await supabase.from('fcra_case_activity').insert({
    case_id: state.currentCaseId,
    activity_type: 'attorney_approval',
    stage: state.currentTab,
    actor: 'attorney',
    summary: 'Approved ' + state.currentTab + ' output',
    details: { table, record_id: recordId }
  });

  setStatus('Approved');
  state.caseData = await fetchCaseDetail(state.currentCaseId);
  renderWorkspace();
}

async function requestChanges(table, recordId) {
  const { error } = await supabase
    .from(table)
    .update({ approval_status: 'needs_changes' })
    .eq('id', recordId);

  if (error) { setStatus('Error: ' + error.message); return; }

  await supabase.from('fcra_case_activity').insert({
    case_id: state.currentCaseId,
    activity_type: 'changes_requested',
    stage: state.currentTab,
    actor: 'attorney',
    summary: 'Requested changes to ' + state.currentTab + ' output',
    details: { table, record_id: recordId }
  });

  // Update case status
  await supabase.from('fcra_cases').update({ case_status: 'needs_changes' }).eq('id', state.currentCaseId);

  setStatus('Changes requested');
  state.caseData = await fetchCaseDetail(state.currentCaseId);
  renderWorkspace();
}

// ==================== RENDER: CASE LIST ====================
function renderCaseList() {
  const container = document.getElementById('case-list');

  if (state.cases.length === 0) {
    container.innerHTML = '<div style="text-align:center;color:var(--text-muted);padding:24px;font-size:13px;">No cases yet</div>';
    return;
  }

  container.innerHTML = state.cases.map(c => {
    const isActive = c.id === state.currentCaseId;
    return `
      <div class="case-item ${isActive ? 'active' : ''}" onclick="App.selectCase('${c.id}')">
        <div class="case-name">
          <span>${escHtml(c.client_name || 'Untitled')}</span>
          <span class="priority-${c.priority || 'medium'}" style="font-size:11px;">${c.priority || ''}</span>
        </div>
        <div class="case-meta">
          <span class="case-stage-badge stage-${c.case_stage}">${STAGE_LABELS[c.case_stage] || c.case_stage}</span>
          &middot; ${escHtml(c.case_status)} &middot; ${formatShortDate(c.updated_at)}
        </div>
      </div>
    `;
  }).join('');
}

// ==================== RENDER: WORKSPACE ====================
function renderWorkspace() {
  const workspace = document.getElementById('workspace');
  const d = state.caseData;

  if (!d || !d.case_record) {
    workspace.innerHTML = `<div class="no-case-view">
      <div class="logo">&#9878;</div>
      <div>Create or select a case to begin</div>
    </div>`;
    return;
  }

  const c = d.case_record;
  const currentStageIdx = stageIndex(c.case_stage);

  // Pipeline progress bar
  const pipelineSteps = ['intake', 'parsing', 'chronology', 'letter', 'comms', 'review'];
  let pipelineHtml = '<div class="pipeline-bar">';
  pipelineSteps.forEach((step, i) => {
    const stepIdx = stageIndex(step);
    let cls = 'pending';
    if (stepIdx < currentStageIdx) cls = 'done';
    else if (stepIdx === currentStageIdx) cls = 'active';
    pipelineHtml += `<div class="pipeline-step ${cls}">${STAGE_LABELS[step]}</div>`;
    if (i < pipelineSteps.length - 1) pipelineHtml += '<span class="pipeline-arrow">&#9654;</span>';
  });
  pipelineHtml += '</div>';

  // Stage tabs
  const tabs = [
    { key: 'intake', label: 'Intake Triage', data: d.triage },
    { key: 'parsing', label: 'Credit Report', data: d.parsed },
    { key: 'chronology', label: 'Chronology', data: d.chronology },
    { key: 'letter', label: 'Dispute Letter', data: d.letter },
    { key: 'comms', label: 'Communications', data: d.communications?.length > 0 },
    { key: 'activity', label: 'Activity Log', data: d.activity?.length > 0 }
  ];

  let tabsHtml = '<div class="stage-tabs">';
  tabs.forEach(t => {
    const active = t.key === state.currentTab ? 'active' : '';
    const hasData = t.data ? 'has-data' : '';
    tabsHtml += `<div class="stage-tab ${active} ${hasData}" onclick="App.switchTab('${t.key}')">${t.label}</div>`;
  });
  tabsHtml += '</div>';

  // Stage content
  let contentHtml = '';
  switch (state.currentTab) {
    case 'intake': contentHtml = renderIntakeTab(d); break;
    case 'parsing': contentHtml = renderParserTab(d); break;
    case 'chronology': contentHtml = renderChronologyTab(d); break;
    case 'letter': contentHtml = renderLetterTab(d); break;
    case 'comms': contentHtml = renderCommsTab(d); break;
    case 'activity': contentHtml = renderActivityTab(d); break;
  }

  workspace.innerHTML = `
    <div class="case-detail">
      <div class="case-detail-header">
        <div>
          <h2>${escHtml(c.client_name)}</h2>
          <div class="case-id">${c.id}</div>
        </div>
        <div style="text-align:right;">
          <span class="case-stage-badge stage-${c.case_stage}">${STAGE_LABELS[c.case_stage] || c.case_stage}</span>
          <div style="font-size:11px;color:var(--text-muted);margin-top:4px;">${escHtml(c.case_status)}</div>
        </div>
      </div>
      ${pipelineHtml}
      ${tabsHtml}
      <div class="draft-banner">DRAFT ANALYSIS &mdash; FOR ATTORNEY REVIEW ONLY</div>
      ${contentHtml}
    </div>
  `;
}

async function init() {
  document.getElementById('header-date').textContent = new Date().toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });

  // Test Supabase connection
  const { data, error } = await supabase.from('fcra_cases').select('id').limit(1);
  const connEl = document.getElementById('connection-status');
  if (error) {
    connEl.innerHTML = '<span class="connection-dot disconnected"></span><span style="font-size:11px;color:var(--status-error);">DB disconnected</span>';
    setStatus('Supabase connection failed: ' + error.message);
  } else {
    connEl.innerHTML = '<span class="connection-dot connected"></span><span style="font-size:11px;color:var(--status-complete);">Connected</span>';
  }

  // Load cases
  state.cases = await fetchCases();
  renderCaseList();

  // Subscribe to realtime changes
  subscribeToChanges();

  setStatus('Ready');
}

document.addEventListener('DOMContentLoaded', init);
