function _barRow(label, value, max) {
  const pct = max > 0 ? Math.min(100, (value / max) * 100) : 0;
  return '<div class="score-bar-row">' +
    '<span class="score-bar-label">' + label.replace(/_/g, ' ') + '</span>' +
    '<div class="score-bar-track"><div class="score-bar-fill" style="width:' + pct + '%"></div></div>' +
    '<span class="score-bar-value">' + value + '/' + max + '</span></div>';
}

function _pctBar(label, value) {
  const pct = Math.min(100, Math.round((Number(value) || 0) * 100));
  return '<div class="score-bar-row">' +
    '<span class="score-bar-label">' + label.replace(/_/g, ' ') + '</span>' +
    '<div class="score-bar-track"><div class="score-bar-fill" style="width:' + pct + '%"></div></div>' +
    '<span class="score-bar-value">' + pct + '%</span></div>';
}

function _statRow(label, val) {
  return '<div class="score-stat-row"><span class="score-stat-label">' + label + '</span><span class="score-stat-value">' + val + '</span></div>';
}

const ELEMENTS = ['notice', 'damages', 'inaccuracy', 'documentation', 'failure_to_investigate'];
const NO_DATA = '<div class="score-no-data">No breakdown data available</div>';

function showScore(key) {
  const d = state.caseData;
  if (!d) return;
  const builders = {
    'viability': function() {
      const va = d.triage?.full_synthesis?.viability_assessment;
      if (!va) return { title: 'Viability Score', html: NO_DATA };
      let h = '';
      if (va.score != null || va.viability_score != null) {
        const s = va.score ?? va.viability_score;
        h += _statRow('Score', s + ' / 100');
        h += _barRow('Overall', Number(s) || 0, 100);
      }
      if (va.rating) h += _statRow('Rating', va.rating);
      if (va.element_breakdown) {
        h += '<div class="score-section-title">Element Breakdown (each scored 0-20)</div>';
        const eb = va.element_breakdown;
        ELEMENTS.forEach(function(k) { h += _barRow(k, Number(eb[k]) || 0, 20); });
        const total = ELEMENTS.reduce(function(s, k) { return s + (Number(eb[k]) || 0); }, 0);
        h += _statRow('Total', total + ' / 100');
      }
      return { title: 'Viability Score', html: h || NO_DATA };
    },
    'intake-confidence': function() {
      const fs = d.triage?.full_synthesis;
      const t = d.triage;
      if (!fs && !t) return { title: 'Triage Confidence', html: NO_DATA };
      let h = '';
      // Show the actual confidence score (how confident the AI triage is)
      const cs = t?.confidence_score ?? fs?.confidence_score;
      if (cs != null) {
        var pct = Number(cs) <= 1 ? Math.round(Number(cs) * 100) : Number(cs);
        h += _statRow('Confidence Score', pct + '%');
        h += _barRow('Confidence', pct, 100);
      }
      // Show viability score for context
      const vs = t?.viability_score ?? fs?.viability_assessment?.viability_score;
      if (vs != null) h += _statRow('Viability Score', vs + ' / 100');
      const sr = t?.strength_rating ?? fs?.viability_assessment?.strength_rating;
      if (sr) h += _statRow('Case Strength', sr);
      return { title: 'Triage Confidence', html: h || NO_DATA };
    },
    'strength': function() {
      const va = d.triage?.full_synthesis?.viability_assessment;
      if (!va) return { title: 'Case Strength', html: NO_DATA };
      let h = '';
      if (va.overall_score != null || va.score != null || va.viability_score != null) {
        const s = va.overall_score ?? va.score ?? va.viability_score;
        h += _statRow('Overall Score', s + ' / 100');
        h += _barRow('Overall', Number(s) || 0, 100);
      }
      if (va.rating || va.strength_rating) h += _statRow('Rating', va.rating || va.strength_rating);
      if (va.element_breakdown) {
        h += '<div class="score-section-title">Element Breakdown</div>';
        const eb = va.element_breakdown;
        ELEMENTS.forEach(function(k) { h += _barRow(k, Number(eb[k]) || 0, 20); });
      }
      return { title: 'Case Strength', html: h || NO_DATA };
    },
    'tradelines': function() {
      const fs = d.parsed?.full_synthesis;
      if (!fs) return { title: 'Tradeline Details', html: NO_DATA };
      const ts = fs.tradeline_summary;
      let h = '';
      if (ts) {
        var stats = [
          ['Total Balance', ts.total_balance != null ? '$' + Number(ts.total_balance).toLocaleString() : null],
          ['Derogatory Accounts', ts.derogatory_accounts],
          ['Total Late Payments', ts.total_late_payments],
          ['Total Tradelines', ts.total_tradelines],
          ['Open Accounts', ts.open_accounts]
        ];
        stats.forEach(function(pair) { if (pair[1] != null) h += _statRow(pair[0], pair[1]); });
      }
      if (!h && fs.error_classification) {
        var ec = fs.error_classification;
        if (ec.total != null) h += _statRow('Total Errors', ec.total);
        if (ec.primary_type) h += _statRow('Primary Type', ec.primary_type.replace(/_/g, ' '));
      }
      if (!h && fs.case_summary) h += _statRow('Summary', fs.case_summary);
      return { title: 'Tradeline Details', html: h || NO_DATA };
    },
    'parser-confidence': function() {
      const fs = d.parsed?.full_synthesis;
      const p = d.parsed;
      if (!fs && !p) return { title: 'Parser Confidence', html: NO_DATA };
      let h = '';
      // Show actual confidence score first (how confident the parser is)
      const cs = p?.confidence_score ?? fs?.confidence_score;
      if (cs != null) {
        var pct = Number(cs) <= 1 ? Math.round(Number(cs) * 100) : Number(cs);
        h += _statRow('Confidence Score', pct + '%');
        h += _barRow('Confidence', pct, 100);
      }
      // Show error classification as context
      if (fs?.error_classification) {
        h += '<div class="score-section-title">Error Classification</div>';
        var ec = fs.error_classification;
        if (ec.total != null) h += _statRow('Total Errors', ec.total);
        if (ec.primary_type) h += _statRow('Primary Type', ec.primary_type.replace(/_/g, ' '));
      }
      // Show case strength as separate section (not as the main confidence metric)
      if (fs?.case_strength) {
        h += '<div class="score-section-title">Case Strength (from parser)</div>';
        var str = fs.case_strength;
        if (str.rating) h += _statRow('Rating', str.rating);
        if (str.score != null) h += _barRow('Strength Score', Number(str.score) || 0, 100);
        if (str.factors) {
          [['High Errors', str.factors.high_errors], ['Critical Errors', str.factors.critical_errors],
           ['Bureau Discrepancies', str.factors.bureau_discrepancies], ['Mixed File Risk', str.factors.mixed_file_risk]
          ].forEach(function(pair) { if (pair[1] != null) h += _statRow(pair[0], pair[1]); });
        }
      }
      return { title: 'Parser Confidence', html: h || NO_DATA };
    },
    'chronology-confidence': function() {
      const fs = d.chronology?.full_synthesis;
      if (!fs) return { title: 'Chronology Confidence', html: NO_DATA };
      const csi = fs.case_strength_indicators;
      let h = '';
      if (csi) {
        h += '<div class="score-section-title">Strength Indicators (0-100%)</div>';
        ['overall_strength', 'violation_severity', 'documentation_score', 'timeline_completeness'].forEach(function(k) {
          if (csi[k] != null) h += _pctBar(k, csi[k]);
        });
        if (csi.strength_rating) h += _statRow('Strength Rating', csi.strength_rating);
      } else {
        if (fs.confidence_score != null) {
          var pct = Number(fs.confidence_score) <= 1 ? Math.round(Number(fs.confidence_score) * 100) : Number(fs.confidence_score);
          h += _statRow('Score', pct + '%');
          h += _barRow('Confidence', pct, 100);
        }
        if (fs.chronology) h += _statRow('Timeline', fs.chronology);
        if (fs.case_summary) h += _statRow('Summary', fs.case_summary);
      }
      return { title: 'Chronology Confidence', html: h || NO_DATA };
    },
    'letter-confidence': function() {
      const fs = d.letter?.full_synthesis;
      if (!fs) return { title: 'Letter Confidence', html: NO_DATA };
      const csi = fs.case_strength_indicators;
      const ca = fs.compliance_assessment;
      let h = '';
      if (csi) {
        h += '<div class="score-section-title">Quality Indicators (0-100%)</div>';
        ['overall_strength', 'template_quality', 'citation_coverage', 'compliance_score'].forEach(function(k) {
          if (csi[k] != null) h += _pctBar(k, csi[k]);
        });
      }
      if (ca?.compliance_checks) {
        h += '<div class="score-section-title">Compliance Checks</div>';
        Object.entries(ca.compliance_checks).forEach(function(pair) {
          var icon = pair[1]
            ? '<span class="score-check-icon" style="color:#4ade80">&#10003;</span>'
            : '<span class="score-check-icon" style="color:#f87171">&#10007;</span>';
          h += '<div class="score-check-row">' + icon + '<span>' + pair[0].replace(/_/g, ' ') + '</span></div>';
        });
      }
      if (!csi && !ca) {
        if (fs.confidence_score != null) {
          var pct = Number(fs.confidence_score) <= 1 ? Math.round(Number(fs.confidence_score) * 100) : Number(fs.confidence_score);
          h += _statRow('Score', pct + '%');
          h += _barRow('Confidence', pct, 100);
        }
        if (fs.draft_notice) h += _statRow('Status', fs.draft_notice);
        if (fs.case_summary) h += _statRow('Summary', fs.case_summary);
      }
      return { title: 'Letter Confidence', html: h || NO_DATA };
    }
  };
  const builder = builders[key];
  if (!builder) return;
  const result = builder();
  showScoreDetail(result.title, result.html);
}

// ==================== PUBLIC API ====================
return {
  showIntakeForm,
  submitIntake,
  selectCase,
  switchTab,
  approveStage,
  requestChanges,
  closeRevisionModal,
  closeDuplicateModal,
  confirmUniqueCase,
  submitRevisionRequest,
  regenerateStage,
  retrySend,
  setStatus,
  onErrorTypeChange,
  handleFileSelect,
  handleFileDrop,
  removePendingFile,
  triggerGapUpload,
  triggerDocUpload,
  triggerReanalysis,
  showScore,
  closeScoreDetail,
  closeCase
};

})(); // end IIFE

// Global DOM helpers
function toggleSection(header) {
  header.classList.toggle('open');
  header.nextElementSibling.classList.toggle('open');
}
</script>
