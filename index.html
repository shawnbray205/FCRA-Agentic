<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FCRA Case Manager</title>
<style>
/* ========== RESET & BASE ========== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg-primary: #0f1419;
  --bg-secondary: #1a2332;
  --bg-tertiary: #243044;
  --bg-sidebar: #141d2b;
  --bg-input: #1e293b;
  --accent-gold: #d4a843;
  --accent-amber: #f5a623;
  --accent-copper: #b87333;
  --status-pending: #6b7280;
  --status-active: #3b82f6;
  --status-complete: #22c55e;
  --status-error: #ef4444;
  --text-primary: #e8edf3;
  --text-secondary: #94a3b8;
  --text-muted: #64748b;
  --border-color: #2d3a4e;
  --sidebar-width: 280px;
  --radius: 8px;
  --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  --font-mono: 'SF Mono', 'Cascadia Code', 'Fira Code', monospace;
}

html, body { height: 100%; }

body {
  font-family: var(--font-sans);
  background: var(--bg-primary);
  color: var(--text-primary);
  line-height: 1.5;
  overflow: hidden;
}

/* ========== LAYOUT ========== */
#app {
  display: grid;
  grid-template-columns: var(--sidebar-width) 1fr;
  grid-template-rows: auto 1fr auto;
  grid-template-areas:
    "sidebar header"
    "sidebar main"
    "sidebar status";
  height: 100vh;
}

/* ========== HEADER ========== */
#config-bar {
  grid-area: header;
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 10px 24px;
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border-color);
}

#config-bar h1 {
  font-size: 16px;
  font-weight: 700;
  color: var(--accent-gold);
  white-space: nowrap;
  letter-spacing: 0.5px;
}

#config-bar .header-meta {
  font-size: 11px;
  color: var(--text-muted);
  white-space: nowrap;
  margin-left: auto;
}

.connection-dot {
  width: 8px; height: 8px; border-radius: 50%;
  display: inline-block; margin-right: 6px;
}
.connection-dot.connected { background: var(--status-complete); }
.connection-dot.disconnected { background: var(--status-error); }

/* ========== SIDEBAR ========== */
#case-sidebar {
  grid-area: sidebar;
  background: var(--bg-sidebar);
  border-right: 1px solid var(--border-color);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

#case-sidebar .sidebar-header {
  padding: 16px;
  border-bottom: 1px solid var(--border-color);
}

#case-sidebar .sidebar-header h2 {
  font-size: 13px;
  color: var(--text-secondary);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 12px;
}

.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 8px 16px;
  border: none;
  border-radius: var(--radius);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
}

.btn-primary {
  background: var(--accent-gold);
  color: #0f1419;
  width: 100%;
}

.btn-primary:hover { background: var(--accent-amber); }
.btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

.btn-secondary {
  background: var(--bg-tertiary);
  color: var(--text-primary);
  border: 1px solid var(--border-color);
}

.btn-secondary:hover { border-color: var(--accent-gold); }

.btn-approve {
  background: rgba(34,197,94,0.15);
  color: #22c55e;
  border: 1px solid #22c55e;
  padding: 6px 14px;
  font-size: 12px;
}
.btn-approve:hover { background: rgba(34,197,94,0.25); }

.btn-reject {
  background: rgba(239,68,68,0.15);
  color: #ef4444;
  border: 1px solid #ef4444;
  padding: 6px 14px;
  font-size: 12px;
}
.btn-reject:hover { background: rgba(239,68,68,0.25); }

.btn-sm { padding: 4px 10px; font-size: 12px; }

#case-list {
  flex: 1;
  overflow-y: auto;
  padding: 8px;
}

.case-item {
  padding: 12px;
  border-radius: var(--radius);
  cursor: pointer;
  margin-bottom: 4px;
  transition: background 0.15s;
  border: 1px solid transparent;
}

.case-item:hover { background: var(--bg-tertiary); }

.case-item.active {
  background: var(--bg-tertiary);
  border-color: var(--accent-gold);
}

.case-name {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 14px;
  font-weight: 600;
}

.case-meta {
  font-size: 11px;
  color: var(--text-muted);
  margin-top: 4px;
}

.case-stage-badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 10px;
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.stage-intake { background: rgba(59,130,246,0.2); color: #60a5fa; }
.stage-parsing { background: rgba(168,85,247,0.2); color: #c084fc; }
.stage-chronology { background: rgba(245,158,11,0.2); color: #fbbf24; }
.stage-letter { background: rgba(236,72,153,0.2); color: #f472b6; }
.stage-comms { background: rgba(34,211,238,0.2); color: #22d3ee; }
.stage-review { background: rgba(34,197,94,0.2); color: #4ade80; }
.stage-closed { background: rgba(107,114,128,0.2); color: #9ca3af; }

.priority-urgent { color: #ef4444; font-weight: 700; }
.priority-high { color: #f59e0b; font-weight: 600; }
.priority-medium { color: var(--text-secondary); }
.priority-low { color: var(--text-muted); }

/* ========== MAIN ========== */
#workspace {
  grid-area: main;
  overflow-y: auto;
  padding: 24px;
}

.no-case-view {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  color: var(--text-muted);
  gap: 16px;
}

.no-case-view .logo { font-size: 48px; opacity: 0.4; }

/* Intake form */
.intake-form {
  max-width: 700px;
  margin: 0 auto;
}

.intake-form h2 {
  font-size: 20px;
  color: var(--accent-gold);
  margin-bottom: 20px;
}

.form-group {
  margin-bottom: 16px;
}

.form-group label {
  display: block;
  font-size: 12px;
  font-weight: 600;
  color: var(--text-secondary);
  margin-bottom: 6px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.form-group input, .form-group textarea, .form-group select {
  width: 100%;
  padding: 8px 12px;
  background: var(--bg-input);
  border: 1px solid var(--border-color);
  border-radius: var(--radius);
  color: var(--text-primary);
  font-size: 13px;
  font-family: var(--font-sans);
}

.form-group input:focus, .form-group textarea:focus, .form-group select:focus {
  outline: none;
  border-color: var(--accent-gold);
}

.form-group textarea { min-height: 80px; resize: vertical; }

.form-group .help-text {
  font-size: 11px;
  color: var(--text-muted);
  margin-top: 4px;
}

.required { color: var(--status-error); }

.form-actions { margin-top: 24px; }

/* Case detail view */
.case-detail { max-width: 900px; }

.case-detail-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 24px;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--border-color);
}

.case-detail-header h2 {
  font-size: 22px;
  color: var(--text-primary);
}

.case-detail-header .case-id {
  font-size: 11px;
  color: var(--text-muted);
  font-family: var(--font-mono);
  margin-top: 4px;
}

/* Pipeline progress */
.pipeline-bar {
  display: flex;
  gap: 4px;
  margin-bottom: 24px;
  background: var(--bg-secondary);
  border-radius: var(--radius);
  padding: 12px 16px;
  align-items: center;
}

.pipeline-step {
  flex: 1;
  text-align: center;
  padding: 8px 4px;
  border-radius: 6px;
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  position: relative;
}

.pipeline-step.done { background: rgba(34,197,94,0.15); color: #4ade80; }
.pipeline-step.active { background: rgba(59,130,246,0.2); color: #60a5fa; animation: pulse 2s infinite; }
.pipeline-step.pending { background: var(--bg-tertiary); color: var(--text-muted); }

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.6; }
}

.pipeline-arrow {
  color: var(--text-muted);
  font-size: 10px;
  flex-shrink: 0;
}

/* Stage tabs */
.stage-tabs {
  display: flex;
  gap: 2px;
  margin-bottom: 20px;
  border-bottom: 1px solid var(--border-color);
}

.stage-tab {
  padding: 10px 16px;
  font-size: 13px;
  font-weight: 600;
  color: var(--text-muted);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all 0.15s;
}

.stage-tab:hover { color: var(--text-secondary); }
.stage-tab.active { color: var(--accent-gold); border-bottom-color: var(--accent-gold); }
.stage-tab.has-data { color: var(--text-primary); }
.stage-tab.has-data::after { content: ' \2713'; color: var(--status-complete); font-size: 11px; }

/* Stage content */
.stage-content {
  background: var(--bg-secondary);
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 20px;
}

.stage-empty {
  text-align: center;
  padding: 40px;
  color: var(--text-muted);
  font-size: 13px;
}

/* Summary cards */
.summary-cards {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 12px;
  margin-bottom: 20px;
}

.summary-card {
  background: var(--bg-tertiary);
  border-radius: var(--radius);
  padding: 16px;
  text-align: center;
}

.card-value {
  font-size: 24px;
  font-weight: 700;
  color: var(--accent-gold);
}

.card-label {
  font-size: 11px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-top: 4px;
}

/* Result sections */
.result-section {
  margin-bottom: 16px;
  border: 1px solid var(--border-color);
  border-radius: var(--radius);
  overflow: hidden;
}

.result-section-header {
  padding: 12px 16px;
  background: var(--bg-tertiary);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.result-section-header .toggle-icon { transition: transform 0.15s; font-size: 10px; }
.result-section-header.open .toggle-icon { transform: rotate(90deg); }

.result-section-body {
  display: none;
  padding: 16px;
}

.result-section-body.open { display: block; }

.result-list { list-style: none; }
.result-list li {
  padding: 8px 0;
  border-bottom: 1px solid rgba(45,58,78,0.5);
  font-size: 13px;
}
.result-list li:last-child { border-bottom: none; }
.item-label { font-weight: 600; color: var(--text-secondary); display: block; font-size: 11px; text-transform: uppercase; margin-bottom: 2px; }
.item-value { color: var(--text-primary); }

.badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 10px;
  font-size: 11px;
  font-weight: 600;
}
.badge-critical { background: rgba(239,68,68,0.2); color: #f87171; }
.badge-high { background: rgba(245,158,11,0.2); color: #fbbf24; }
.badge-medium { background: rgba(59,130,246,0.2); color: #60a5fa; }
.badge-low { background: rgba(34,197,94,0.2); color: #4ade80; }

/* Attorney actions */
.attorney-actions {
  display: flex;
  gap: 10px;
  padding: 16px;
  background: rgba(212,168,67,0.06);
  border: 1px solid rgba(212,168,67,0.2);
  border-radius: var(--radius);
  margin-bottom: 20px;
  align-items: center;
}

.attorney-actions .label {
  font-size: 12px;
  font-weight: 600;
  color: var(--accent-gold);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-right: auto;
}

/* Activity timeline */
.activity-timeline {
  margin-top: 24px;
}

.activity-timeline h3 {
  font-size: 14px;
  color: var(--text-secondary);
  margin-bottom: 12px;
}

.activity-item {
  display: flex;
  gap: 12px;
  padding: 10px 0;
  border-bottom: 1px solid rgba(45,58,78,0.3);
  font-size: 12px;
}

.activity-item .time {
  color: var(--text-muted);
  white-space: nowrap;
  min-width: 140px;
  font-family: var(--font-mono);
  font-size: 11px;
}

.activity-item .actor {
  color: var(--accent-copper);
  min-width: 80px;
}

.activity-item .summary { color: var(--text-primary); }

/* Document preview */
.document-preview {
  background: var(--bg-primary);
  border: 1px solid var(--border-color);
  border-radius: var(--radius);
  padding: 20px;
  font-size: 13px;
  line-height: 1.7;
  white-space: pre-wrap;
  max-height: 400px;
  overflow-y: auto;
}

/* Draft banner */
.draft-banner {
  text-align: center;
  padding: 8px;
  border: 1px dashed var(--accent-copper);
  color: var(--accent-copper);
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 1px;
  margin-bottom: 16px;
  border-radius: var(--radius);
}

/* Raw JSON */
.raw-json {
  background: var(--bg-primary);
  border-radius: var(--radius);
  padding: 12px;
  font-family: var(--font-mono);
  font-size: 11px;
  white-space: pre-wrap;
  max-height: 300px;
  overflow-y: auto;
  color: var(--text-secondary);
}

/* Email preview */
.email-preview {
  background: var(--bg-primary);
  border: 1px solid var(--border-color);
  border-radius: var(--radius);
  overflow: hidden;
}
.email-header {
  padding: 12px 16px;
  border-bottom: 1px solid var(--border-color);
  font-size: 13px;
}
.email-field { margin-bottom: 4px; }
.email-body { padding: 16px; font-size: 13px; white-space: pre-wrap; line-height: 1.7; }

/* Loading */
.loading-overlay {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 60px;
  gap: 16px;
}

.spinner {
  width: 32px; height: 32px;
  border: 3px solid var(--border-color);
  border-top-color: var(--accent-gold);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

.loading-text { color: var(--text-muted); font-size: 13px; }

/* Status bar */
#status-bar {
  grid-area: status;
  display: flex;
  justify-content: space-between;
  padding: 6px 24px;
  font-size: 11px;
  color: var(--text-muted);
  background: var(--bg-secondary);
  border-top: 1px solid var(--border-color);
}

/* Upload zone */
.upload-zone {
  border: 2px dashed var(--border-color);
  border-radius: var(--radius);
  padding: 20px;
  text-align: center;
  cursor: pointer;
  transition: border-color 0.2s, background 0.2s;
  margin-top: 8px;
}
.upload-zone:hover, .upload-zone.drag-over {
  border-color: var(--accent-gold);
  background: rgba(212,168,67,0.06);
}
.upload-zone input[type="file"] { display: none; }
.upload-zone .upload-icon { font-size: 24px; margin-bottom: 6px; }
.upload-zone .upload-label { font-size: 13px; color: var(--text-secondary); }
.upload-zone .upload-hint { font-size: 11px; color: var(--text-muted); margin-top: 4px; }

.upload-file-list {
  margin-top: 8px;
}
.upload-file-item {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 10px; background: var(--bg-tertiary);
  border-radius: 6px; margin-bottom: 4px; font-size: 12px;
}
.upload-file-item .file-name { flex: 1; color: var(--text-primary); }
.upload-file-item .file-size { color: var(--text-muted); font-size: 11px; }
.upload-file-item .remove-file {
  color: var(--status-error); cursor: pointer; font-size: 14px;
  background: none; border: none; padding: 0 4px;
}

.doc-recommendations {
  margin-top: 12px; padding: 12px 16px;
  background: rgba(59,130,246,0.06);
  border: 1px solid rgba(59,130,246,0.15);
  border-radius: var(--radius);
}
.doc-recommendations h4 {
  font-size: 12px; color: #60a5fa; text-transform: uppercase;
  letter-spacing: 0.5px; margin-bottom: 8px;
}
.doc-rec-item {
  display: flex; align-items: center; gap: 8px;
  font-size: 13px; margin-bottom: 4px; color: var(--text-secondary);
}
.doc-rec-item .req-badge {
  font-size: 10px; padding: 1px 6px; border-radius: 4px;
  background: rgba(239,68,68,0.15); color: #f87171; font-weight: 600;
}
.doc-rec-item .opt-badge {
  font-size: 10px; padding: 1px 6px; border-radius: 4px;
  background: rgba(100,116,139,0.2); color: #94a3b8;
}

/* Document cards in Documents tab */
.doc-card {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 16px; background: var(--bg-tertiary);
  border-radius: var(--radius); margin-bottom: 8px;
  border-left: 3px solid var(--accent-gold);
}
.doc-card .doc-icon { font-size: 20px; }
.doc-card .doc-info { flex: 1; }
.doc-card .doc-name { font-size: 13px; font-weight: 600; color: var(--text-primary); }
.doc-card .doc-meta { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
.doc-card .doc-actions { display: flex; gap: 6px; }

/* Gap upload button */
.gap-upload-btn {
  margin-top: 8px; padding: 4px 12px;
  font-size: 11px; background: rgba(59,130,246,0.1);
  border: 1px solid rgba(59,130,246,0.3); border-radius: 4px;
  color: #60a5fa; cursor: pointer; display: inline-flex;
  align-items: center; gap: 4px;
}
.gap-upload-btn:hover { background: rgba(59,130,246,0.2); }

/* Upload progress */
.upload-progress {
  margin-top: 6px; height: 4px; background: var(--bg-primary);
  border-radius: 2px; overflow: hidden;
}
.upload-progress-bar {
  height: 100%; background: var(--accent-gold);
  transition: width 0.3s; border-radius: 2px;
}

/* Print styles */
@media print {
  #case-sidebar, #config-bar, #status-bar, .btn, .attorney-actions { display: none !important; }
  #app { display: block !important; }
  #workspace { padding: 0 !important; overflow: visible !important; }
  body { background: #fff; color: #000; }
  .draft-banner { color: #b45309; border-color: #b45309; }
}
</style>
</head>

<div id="app">
  <!-- SIDEBAR -->
  <aside id="case-sidebar">
    <div class="sidebar-header">
      <h2>Cases</h2>
      <button class="btn btn-primary" onclick="App.showIntakeForm()">+ New Case</button>
    </div>
    <div id="case-list"></div>
  </aside>

  <!-- HEADER -->
  <header id="config-bar">
    <h1>FCRA CASE MANAGER</h1>
    <span id="connection-status"></span>
    <span class="header-meta" id="header-date"></span>
  </header>

  <!-- MAIN -->
  <main id="workspace">
    <div class="no-case-view">
      <div class="logo">&#9878;</div>
      <div>Create or select a case to begin</div>

  <!-- STATUS BAR -->
  <footer id="status-bar">
    <span id="status-left">Ready</span>
    <span id="status-right">FCRA Case Manager v2.0 — Supabase</span>
  </footer>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

// ==================== SUPABASE QUERIES ====================
async function fetchCases() {
  const { data, error } = await supabase
    .from('fcra_cases')
    .select('id, client_name, case_stage, case_status, priority, created_at, updated_at')
    .order('updated_at', { ascending: false });
  if (error) { setStatus('Error loading cases: ' + error.message); return []; }
  return data || [];
}

async function fetchCaseDetail(caseId) {
  const [caseRes, triageRes, parsedRes, chronRes, letterRes, commsRes, activityRes, docsRes] = await Promise.all([
    supabase.from('fcra_cases').select('*').eq('id', caseId).single(),
    supabase.from('fcra_triage_results').select('*').eq('case_id', caseId).order('created_at', { ascending: false }).limit(1),
    supabase.from('fcra_parsed_reports').select('*').eq('case_id', caseId).order('created_at', { ascending: false }).limit(1),
    supabase.from('fcra_case_chronology').select('*').eq('case_id', caseId).order('created_at', { ascending: false }).limit(1),
    supabase.from('fcra_letters').select('*').eq('case_id', caseId).order('created_at', { ascending: false }).limit(1),
    supabase.from('fcra_communications').select('*').eq('case_id', caseId).order('created_at', { ascending: false }),
    supabase.from('fcra_case_activity').select('*').eq('case_id', caseId).order('created_at', { ascending: false }).limit(50),
    supabase.from('fcra_case_documents').select('*').eq('case_id', caseId).order('created_at', { ascending: false })
  ]);

  return {
    case_record: caseRes.data,
    triage: triageRes.data?.[0] || null,
    parsed: parsedRes.data?.[0] || null,
    chronology: chronRes.data?.[0] || null,
    letter: letterRes.data?.[0] || null,
    communications: commsRes.data || [],
    activity: activityRes.data || [],
    documents: docsRes.data || []
  };
}

// ==================== REALTIME ====================
function subscribeToChanges() {
  if (state.realtimeChannel) state.realtimeChannel.unsubscribe();

  state.realtimeChannel = supabase
    .channel('fcra-cases-changes')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'fcra_cases' }, async () => {
      state.cases = await fetchCases();
      renderCaseList();
      if (state.currentCaseId) {
        state.caseData = await fetchCaseDetail(state.currentCaseId);
        renderWorkspace();
      }
    })
    .subscribe();
}

function formatDate(iso) {
  if (!iso) return '';
  return new Date(iso).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric', hour: '2-digit', minute: '2-digit' });
}

function formatShortDate(iso) {
  if (!iso) return '';
  return new Date(iso).toLocaleDateString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
}

function setStatus(msg) {
  document.getElementById('status-left').textContent = msg;
}

function escHtml(str) {
  const div = document.createElement('div');
  div.textContent = String(str ?? '');
  return div.innerHTML;
}

function escAttr(str) {
  return String(str ?? '').replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function stageIndex(stage) {
  return STAGE_ORDER.indexOf(stage);
}

async function submitIntake() {
  if (state.isSubmitting) return;

  const clientName = document.getElementById('field-client_name')?.value.trim();
  const complaintSummary = document.getElementById('field-complaint_summary')?.value.trim();
  const errorType = document.getElementById('field-error_type')?.value;

  if (!clientName || !complaintSummary || !errorType) {
    setStatus('Please fill in all required fields');
    ['field-client_name', 'field-complaint_summary', 'field-error_type'].forEach(id => {
      const el = document.getElementById(id);
      if (el && !el.value.trim()) el.style.borderColor = 'var(--status-error)';
    });
    return;
  }

  const payload = {
    client_name: clientName,
    client_email: document.getElementById('field-client_email')?.value.trim() || null,
    complaint_summary: complaintSummary,
    error_type: errorType,
    discovery_date: document.getElementById('field-discovery_date')?.value || null,
    dispute_history: document.getElementById('field-dispute_history')?.value.trim() || '',
    priority: document.getElementById('field-priority')?.value || 'medium'
  };

  state.isSubmitting = true;
  const btn = document.getElementById('btn-submit');
  if (btn) { btn.disabled = true; btn.textContent = 'Submitting...'; }
  setStatus('Submitting to FCRA pipeline...');

  try {
    const controller = new AbortController();
    const timeout = setTimeout(() => controller.abort(), 300000); // 5 min for full pipeline

    const res = await fetch(N8N_BASE_URL + '/webhook/fcra-pipeline', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
      signal: controller.signal
    });

    clearTimeout(timeout);

    if (!res.ok) throw new Error('HTTP ' + res.status + ': ' + (await res.text()).substring(0, 200));

    const result = await res.json();
    setStatus('Pipeline completed: ' + (result.stages_completed?.length || 0) + ' stages');

    // Upload any pending documents
    if (result.case_id && pendingFiles.length > 0) {
      setStatus('Uploading ' + pendingFiles.length + ' document(s)...');
      const uploaded = await uploadCaseDocuments(result.case_id, pendingFiles, 'intake');
      if (uploaded.length) {
        await supabase.from('fcra_case_activity').insert({
          case_id: result.case_id,
          activity_type: 'document_upload',
          stage: 'intake',
          actor: 'dashboard',
          summary: 'Uploaded ' + uploaded.length + ' document(s) at intake',
          details: { files: uploaded.map(u => u.file_name) }
        });
        setStatus('Pipeline done. ' + uploaded.length + ' document(s) uploaded.');
      }
      pendingFiles = [];
    }

    // Refresh case list and select the new case
    state.cases = await fetchCases();
    if (result.case_id) {
      await selectCase(result.case_id);
    }

  } catch (err) {
    setStatus('Error: ' + (err.name === 'AbortError' ? 'Request timed out (5min)' : err.message));
    // Still refresh cases — the case may have been created even if pipeline failed partway
    state.cases = await fetchCases();
    renderCaseList();
  }

  state.isSubmitting = false;
}

// ==================== ATTORNEY ACTIONS ====================
async function approveStage(table, recordId) {
  const { error } = await supabase
    .from(table)
    .update({ approval_status: 'approved', approved_by: 'Attorney', approved_at: new Date().toISOString() })
    .eq('id', recordId);

  if (error) { setStatus('Error: ' + error.message); return; }

  // Log activity
  await supabase.from('fcra_case_activity').insert({
    case_id: state.currentCaseId,
    activity_type: 'attorney_approval',
    stage: state.currentTab,
    actor: 'attorney',
    summary: 'Approved ' + state.currentTab + ' output',
    details: { table, record_id: recordId }
  });

  setStatus('Approved');
  state.caseData = await fetchCaseDetail(state.currentCaseId);
  renderWorkspace();
}

async function requestChanges(table, recordId) {
  const { error } = await supabase
    .from(table)
    .update({ approval_status: 'needs_changes' })
    .eq('id', recordId);

  if (error) { setStatus('Error: ' + error.message); return; }

  await supabase.from('fcra_case_activity').insert({
    case_id: state.currentCaseId,
    activity_type: 'changes_requested',
    stage: state.currentTab,
    actor: 'attorney',
    summary: 'Requested changes to ' + state.currentTab + ' output',
    details: { table, record_id: recordId }
  });

  // Update case status
  await supabase.from('fcra_cases').update({ case_status: 'needs_changes' }).eq('id', state.currentCaseId);

  setStatus('Changes requested');
  state.caseData = await fetchCaseDetail(state.currentCaseId);
  renderWorkspace();
}

// ==================== RENDER: WORKSPACE ====================
function renderWorkspace() {
  const workspace = document.getElementById('workspace');
  const d = state.caseData;

  if (!d || !d.case_record) {
    workspace.innerHTML = `<div class="no-case-view">
      <div class="logo">&#9878;</div>
      <div>Create or select a case to begin</div>
    </div>`;
    return;
  }

  const c = d.case_record;
  const currentStageIdx = stageIndex(c.case_stage);

  // Pipeline progress bar
  const pipelineSteps = ['intake', 'parsing', 'chronology', 'letter', 'comms', 'review'];
  let pipelineHtml = '<div class="pipeline-bar">';
  pipelineSteps.forEach((step, i) => {
    const stepIdx = stageIndex(step);
    let cls = 'pending';
    if (stepIdx < currentStageIdx) cls = 'done';
    else if (stepIdx === currentStageIdx) cls = 'active';
    pipelineHtml += `<div class="pipeline-step ${cls}">${STAGE_LABELS[step]}</div>`;
    if (i < pipelineSteps.length - 1) pipelineHtml += '<span class="pipeline-arrow">&#9654;</span>';
  });
  pipelineHtml += '</div>';

  // Stage tabs
  const tabs = [
    { key: 'intake', label: 'Intake Triage', data: d.triage },
    { key: 'parsing', label: 'Credit Report', data: d.parsed },
    { key: 'chronology', label: 'Chronology', data: d.chronology },
    { key: 'letter', label: 'Dispute Letter', data: d.letter },
    { key: 'comms', label: 'Communications', data: d.communications?.length > 0 },
    { key: 'documents', label: 'Documents', data: d.documents?.length > 0 },
    { key: 'activity', label: 'Activity Log', data: d.activity?.length > 0 }
  ];

  let tabsHtml = '<div class="stage-tabs">';
  tabs.forEach(t => {
    const active = t.key === state.currentTab ? 'active' : '';
    const hasData = t.data ? 'has-data' : '';
    tabsHtml += `<div class="stage-tab ${active} ${hasData}" onclick="App.switchTab('${t.key}')">${t.label}</div>`;
  });
  tabsHtml += '</div>';

  // Stage content
  let contentHtml = '';
  switch (state.currentTab) {
    case 'intake': contentHtml = renderIntakeTab(d); break;
    case 'parsing': contentHtml = renderParserTab(d); break;
    case 'chronology': contentHtml = renderChronologyTab(d); break;
    case 'letter': contentHtml = renderLetterTab(d); break;
    case 'comms': contentHtml = renderCommsTab(d); break;
    case 'documents': contentHtml = renderDocumentsTab(d); break;
    case 'activity': contentHtml = renderActivityTab(d); break;
  }

  workspace.innerHTML = `
    <div class="case-detail">
      <div class="case-detail-header">
        <div>
          <h2>${escHtml(c.client_name)}</h2>
          <div class="case-id">${c.id}</div>
        </div>
        <div style="text-align:right;">
          <span class="case-stage-badge stage-${c.case_stage}">${STAGE_LABELS[c.case_stage] || c.case_stage}</span>
          <div style="font-size:11px;color:var(--text-muted);margin-top:4px;">${escHtml(c.case_status)}</div>
        </div>
      </div>
      ${pipelineHtml}
      ${tabsHtml}
      <div class="draft-banner">DRAFT ANALYSIS &mdash; FOR ATTORNEY REVIEW ONLY</div>
      ${contentHtml}
    </div>
  `;
}

    <div class="summary-card"><div class="card-value">${t.confidence_score != null ? (Number(t.confidence_score) > 1 ? t.confidence_score : (Number(t.confidence_score) * 100).toFixed(0) + '%') : '--'}</div><div class="card-label">Confidence</div></div>

  if (t.sol_status) {
    html += renderSection('Statute of Limitations', `<ul class="result-list">

  if (!ch) return '<div class="stage-content"><div class="stage-empty">Case chronology has not been built yet.</div></div>';

  let html = '<div class="stage-content">';

  const timeline = ch.chronology || [];
  const violations = ch.violations_identified || [];
  const gaps = ch.documentation_gaps || [];

  html += `<div class="summary-cards">
    <div class="summary-card"><div class="card-value">${Array.isArray(timeline) ? timeline.length : '--'}</div><div class="card-label">Events</div></div>
    <div class="summary-card"><div class="card-value">${Array.isArray(violations) ? violations.length : '--'}</div><div class="card-label">Violations</div></div>
    <div class="summary-card"><div class="card-value">${Array.isArray(gaps) ? gaps.length : '--'}</div><div class="card-label">Gaps</div></div>
    <div class="summary-card"><div class="card-value">${ch.confidence_score != null ? (Number(ch.confidence_score) * 100).toFixed(0) + '%' : '--'}</div><div class="card-label">Confidence</div></div>
  </div>`;

  if (timeline.length) {
    html += renderSection('Timeline', `<ul class="result-list">
      ${timeline.map(e => `<li><span class="item-label">${escHtml(e.date || e.timestamp || '')}</span><div class="item-value">${escHtml(e.event || e.description || JSON.stringify(e))}</div></li>`).join('')}
    </ul>`, true);
  }

  if (gaps.length) {
    html += renderSection('Documentation Gaps', `<div style="font-size:13px;">${gaps.map(g => {
      if (typeof g === 'string') return `<div style="color:var(--accent-amber);margin-bottom:4px;">• ${escHtml(g)}</div>`;
      const pColor = g.priority === 'high' ? '#f87171' : g.priority === 'medium' ? '#fbbf24' : '#4ade80';
      return `<div style="background:rgba(245,158,11,0.08);border-left:3px solid ${pColor};padding:10px 14px;margin:6px 0;border-radius:6px;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;">
          <span style="font-weight:600;color:#fbbf24;">${escHtml(g.gap || '')}</span>
          <span class="badge" style="background:${pColor}22;color:${pColor};font-size:10px;padding:2px 8px;">${escHtml((g.priority || '').toUpperCase())}</span>
        </div>
        ${g.fcra_section ? `<div style="color:#60a5fa;font-size:12px;margin-bottom:4px;">FCRA ${escHtml(g.fcra_section)}</div>` : ''}
        <div style="color:#cbd5e1;margin-bottom:4px;">${escHtml(g.recommendation || '')}</div>
        ${g.legal_significance ? `<div style="color:#94a3b8;font-size:12px;font-style:italic;">${escHtml(g.legal_significance)}</div>` : ''}
        <button class="gap-upload-btn" onclick="App.triggerGapUpload('${escAttr(g.gap || '')}')">&#128206; Upload Document</button>
      </div>`;
    }).join('')}</div>`, true);
  }

  if (ch.attorney_action_items?.length) {
    html += renderSection('Attorney Action Items', `<ol style="padding-left:20px;font-size:13px;">
      ${ch.attorney_action_items.map(a => `<li style="margin-bottom:6px;">${escHtml(typeof a === 'string' ? a : JSON.stringify(a))}</li>`).join('')}
    </ol>`, true);
  }

  if (ch.full_synthesis) {
    html += renderSection('Full Synthesis (JSON)', `<div class="raw-json">${escHtml(JSON.stringify(ch.full_synthesis, null, 2))}</div>`, false);
  }

  html += '</div>';
  return html;
}

    html += renderSection('Attorney Action Items', `<ol style="padding-left:20px;font-size:13px;">
      ${l.attorney_action_items.map(a => `<li style="margin-bottom:6px;">${escHtml(a)}</li>`).join('')}

  if (l.full_synthesis) {

// ==================== DOCUMENT UPLOAD ====================
let pendingFiles = []; // files queued during intake

function onErrorTypeChange(errorType) {
  const section = document.getElementById('doc-upload-section');
  const recsEl = document.getElementById('doc-recommendations');
  if (!errorType || !ERROR_TYPE_DOCS[errorType]) {
    section.style.display = 'none';
    return;
  }
  section.style.display = 'block';
  const docs = ERROR_TYPE_DOCS[errorType];
  recsEl.innerHTML = `<h4>Recommended Documents for ${errorType.replace(/_/g, ' ')}</h4>` +
    docs.map(d => `<div class="doc-rec-item">
      <span>${d.label}</span>
      <span class="${d.required ? 'req-badge' : 'opt-badge'}">${d.required ? 'Required' : 'Optional'}</span>
    </div>`).join('');
}

function handleFileSelect(event) {
  const files = Array.from(event.target.files || []);
  addPendingFiles(files);
  event.target.value = '';
}

function handleFileDrop(event) {
  const files = Array.from(event.dataTransfer.files || []);
  addPendingFiles(files);
}

function addPendingFiles(files) {
  const maxSize = 10 * 1024 * 1024; // 10MB
  for (const f of files) {
    if (f.size > maxSize) { setStatus('File too large: ' + f.name + ' (max 10MB)'); continue; }
    if (pendingFiles.some(p => p.name === f.name && p.size === f.size)) continue;
    pendingFiles.push(f);
  }
  renderPendingFiles();
}

function removePendingFile(idx) {
  pendingFiles.splice(idx, 1);
  renderPendingFiles();
}

function renderPendingFiles() {
  const list = document.getElementById('file-list');
  if (!list) return;
  if (pendingFiles.length === 0) { list.innerHTML = ''; return; }
  list.innerHTML = pendingFiles.map((f, i) => `<div class="upload-file-item">
    <span class="doc-icon">&#128196;</span>
    <span class="file-name">${escHtml(f.name)}</span>
    <span class="file-size">${(f.size / 1024).toFixed(0)} KB</span>
    <button class="remove-file" onclick="App.removePendingFile(${i})" title="Remove">&times;</button>
  </div>`).join('');
}

async function uploadCaseDocuments(caseId, files, source = 'intake', gapRef = null) {
  const results = [];
  for (const file of files) {
    const filePath = `${caseId}/${Date.now()}_${file.name}`;
    const { error: uploadErr } = await supabase.storage
      .from('case-documents')
      .upload(filePath, file, { contentType: file.type, upsert: false });

    if (uploadErr) {
      console.error('Upload error:', uploadErr);
      setStatus('Upload failed: ' + file.name);
      continue;
    }

    // Guess document type from filename or default
    let docType = 'supporting_docs';
    const lower = file.name.toLowerCase();
    if (lower.includes('credit') && lower.includes('report')) docType = 'credit_report';
    else if (lower.includes('dispute')) docType = 'dispute_letter';
    else if (lower.includes('police') || lower.includes('ftc')) docType = 'police_report';
    else if (lower.includes('identity') || lower.includes('license') || lower.includes('ssn')) docType = 'identity_docs';
    else if (lower.includes('statement')) docType = 'account_statements';
    else if (lower.includes('background')) docType = 'background_report';
    else if (lower.includes('adverse')) docType = 'adverse_action';
    else if (lower.includes('medical') || lower.includes('eob')) docType = 'medical_records';

    const { error: metaErr } = await supabase.from('fcra_case_documents').insert({
      case_id: caseId,
      document_type: docType,
      file_name: file.name,
      file_path: filePath,
      file_size: file.size,
      mime_type: file.type || 'application/octet-stream',
      upload_source: source,
      gap_reference: gapRef,
      uploaded_by: 'dashboard'
    });

    if (metaErr) console.error('Metadata insert error:', metaErr);
    else results.push({ file_name: file.name, file_path: filePath });
  }
  return results;
}

// Gap-specific upload (from chronology gap cards)
function triggerGapUpload(gapTitle) {
  const input = document.createElement('input');
  input.type = 'file';
  input.multiple = true;
  input.accept = '.pdf,.png,.jpg,.jpeg,.doc,.docx,.txt,.csv';
  input.onchange = async (e) => {
    const files = Array.from(e.target.files || []);
    if (!files.length) return;
    setStatus('Uploading documents for gap: ' + gapTitle + '...');
    const results = await uploadCaseDocuments(state.currentCaseId, files, 'gap_resolution', gapTitle);
    if (results.length) {
      setStatus(results.length + ' document(s) uploaded for gap resolution');
      // Log activity
      await supabase.from('fcra_case_activity').insert({
        case_id: state.currentCaseId,
        activity_type: 'document_upload',
        stage: 'chronology',
        actor: 'dashboard',
        summary: 'Uploaded ' + results.length + ' doc(s) to resolve gap: ' + gapTitle,
        details: { gap: gapTitle, files: results.map(r => r.file_name) }
      });
      // Refresh case data
      state.caseData = await fetchCaseDetail(state.currentCaseId);
      renderWorkspace();
    }
  };
  input.click();
}

// ==================== RENDER: DOCUMENTS TAB ====================
function renderDocumentsTab(d) {
  const docs = d.documents || [];
  let html = '<div class="stage-content">';

  // Upload button
  html += `<div style="margin-bottom:16px;">
    <button class="btn btn-primary" onclick="App.triggerDocUpload()" style="font-size:13px;padding:8px 16px;">
      &#128206; Upload Documents
    </button>
  </div>`;

  if (!docs.length) {
    html += '<div class="stage-empty">No documents uploaded yet. Use the button above or upload from gap cards in the Chronology tab.</div>';
    html += '</div>';
    return html;
  }

  html += `<div class="summary-cards">
    <div class="summary-card"><div class="card-value">${docs.length}</div><div class="card-label">Total Documents</div></div>
    <div class="summary-card"><div class="card-value">${docs.filter(d => d.upload_source === 'intake').length}</div><div class="card-label">From Intake</div></div>
    <div class="summary-card"><div class="card-value">${docs.filter(d => d.upload_source === 'gap_resolution').length}</div><div class="card-label">Gap Resolutions</div></div>
  </div>`;

  docs.forEach(doc => {
    const { data: urlData } = supabase.storage.from('case-documents').getPublicUrl(doc.file_path);
    const publicUrl = urlData?.publicUrl || '#';
    const icon = doc.mime_type?.includes('pdf') ? '&#128211;' :
                 doc.mime_type?.includes('image') ? '&#128247;' :
                 doc.mime_type?.includes('word') || doc.mime_type?.includes('document') ? '&#128196;' : '&#128196;';
    const srcBadgeColor = doc.upload_source === 'gap_resolution' ? '#60a5fa' : '#4ade80';
    const srcLabel = doc.upload_source === 'gap_resolution' ? 'Gap' : doc.upload_source === 'intake' ? 'Intake' : doc.upload_source;

    html += `<div class="doc-card">
      <span class="doc-icon">${icon}</span>
      <div class="doc-info">
        <div class="doc-name">${escHtml(doc.file_name)}</div>
        <div class="doc-meta">
          ${escHtml(doc.document_type.replace(/_/g, ' '))} &middot;
          ${doc.file_size ? (doc.file_size / 1024).toFixed(0) + ' KB' : ''} &middot;
          ${formatShortDate(doc.created_at)}
          ${doc.gap_reference ? ` &middot; Gap: ${escHtml(doc.gap_reference)}` : ''}
        </div>
      </div>
      <span class="badge" style="background:${srcBadgeColor}22;color:${srcBadgeColor};font-size:10px;">${srcLabel}</span>
      <a href="${publicUrl}" target="_blank" class="btn btn-secondary btn-sm" style="font-size:11px;padding:4px 10px;text-decoration:none;">View</a>
    </div>`;
  });

  html += '</div>';
  return html;
}

function triggerDocUpload() {
  const input = document.createElement('input');
  input.type = 'file';
  input.multiple = true;
  input.accept = '.pdf,.png,.jpg,.jpeg,.doc,.docx,.txt,.csv';
  input.onchange = async (e) => {
    const files = Array.from(e.target.files || []);
    if (!files.length) return;
    setStatus('Uploading ' + files.length + ' document(s)...');
    const results = await uploadCaseDocuments(state.currentCaseId, files, 'client');
    if (results.length) {
      setStatus(results.length + ' document(s) uploaded');
      await supabase.from('fcra_case_activity').insert({
        case_id: state.currentCaseId,
        activity_type: 'document_upload',
        stage: 'documents',
        actor: 'dashboard',
        summary: 'Uploaded ' + results.length + ' document(s)',
        details: { files: results.map(r => r.file_name) }
      });
      state.caseData = await fetchCaseDetail(state.currentCaseId);
      renderWorkspace();
    }
  };
  input.click();
}

// ==================== SECTION HELPER ====================
function renderSection(title, content, startOpen = false) {
  return `<div class="result-section">
    <div class="result-section-header ${startOpen ? 'open' : ''}" onclick="toggleSection(this)">
      ${escHtml(title)}
      <span class="toggle-icon">&#9654;</span>
    </div>
    <div class="result-section-body ${startOpen ? 'open' : ''}">${content}</div>
  </div>`;
}

// ==================== INIT ====================
async function init() {
  document.getElementById('header-date').textContent = new Date().toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });

  // Test Supabase connection
  const { data, error } = await supabase.from('fcra_cases').select('id').limit(1);
  const connEl = document.getElementById('connection-status');
  if (error) {
    connEl.innerHTML = '<span class="connection-dot disconnected"></span><span style="font-size:11px;color:var(--status-error);">DB disconnected</span>';
    setStatus('Supabase connection failed: ' + error.message);
  } else {
    connEl.innerHTML = '<span class="connection-dot connected"></span><span style="font-size:11px;color:var(--status-complete);">Connected</span>';
  }

  // Load cases
  state.cases = await fetchCases();
  renderCaseList();

  // Subscribe to realtime changes
  subscribeToChanges();

  setStatus('Ready');
}

document.addEventListener('DOMContentLoaded', init);

// ==================== PUBLIC API ====================
return {
  showIntakeForm,
  submitIntake,
  selectCase,
  switchTab,
  approveStage,
  requestChanges,
  setStatus,
  onErrorTypeChange,
  handleFileSelect,
  handleFileDrop,
  removePendingFile,
  triggerGapUpload,
  triggerDocUpload
};

})(); // end IIFE

// Global DOM helpers
function toggleSection(header) {
  header.classList.toggle('open');
  header.nextElementSibling.classList.toggle('open');
}
